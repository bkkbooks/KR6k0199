front:
  text: 御製水懺序夫三昧水懺者因唐悟達國師知玄遇迦諾迦尊者以三昧水為濯積世怨讐知玄遂演大覺之旨述為懺文普利將來甚盛心也其為福德莫可涯涘所謂三昧者正受之名也不受諸受乃為正受真空寂定此心不動其要使人求之於己而已蓋人之生於世也自非上智之資豈能無故作誤為之愆或宿世冤業之繞如來廣慈悲之念啓懺悔之門苟能精白一心懺悔為善則積纍罪業一旦氷釋譬諸水也身之煩而濯之無不清衣之污而浣之無不潔器之穢而溉之無不淨其幾不踰於方寸之間而已矣故曰心者身之神明所為善則善應所為惡則惡應若影之隨形響之隨聲其效驗之捷速不爽毫髮此三昧水懺之作所以利於人也其功博哉恆惟知玄以十世高僧尚負宿報矧常人乎昔孫皓穢犯金像陰遭譴罰懺悔自陳禍即消釋法佐交車議師不慎幽獨師重加責以懺獲免若此者固多凡人揆之于心豈能無愧匪由懺悔曷以滌除端能趨進善塗一絲惡念不萌於心則菑禍潛消福德增長若雨潤群卉生息繁茂目雖不覩而陰受其滋益者多矣然則三昧者其惟在於人心而不必他求也朕遂書此以冠于篇并以鋟梓作方便利益是為汲大海之三昧以遍周沙界灌濯塵劫者也觀於斯者尚慎其所趨向哉永樂十四年七月初一日慈悲道場水懺序竊謂聖教經律論藏譯席所翻之外爾後群賢製作未有無所感而為之者乎若條陳枚舉品別而言未易紀極即此靈文而曰水懺者請言其由昔唐懿宗朝有悟達國師知玄者未顯時嘗與一僧邂逅於京師忘其所寓之地其僧乃患迦摩羅疾衆皆惡之而知玄與之為鄰時時顧問略無厭色因分袂其僧感其風義祝之曰子向後有難可往西蜀彭州茶隴山相尋其山有二松為志後悟達國師居安國寺道德昭著懿宗親臨法席賜沈香為法座恩渥甚厚自爾忽生人面瘡於膝上眉目口齒俱備每以飲食餧之則開口吞啖與人無異遍召名醫皆拱手默默因記昔日同住僧之語竟入山相尋值天色已晚倣徨四顧乃見二松於煙雲間信期約之不誣即趨其所崇樓廣殿金碧交輝其僧立於門首顧接甚歡因留宿遂以所苦告之彼云無傷也巖下有泉明旦濯之即愈黎明童子引至泉所方掬水間其人面瘡遂大呼未可洗公識達深遠考究古今曾讀西漢書袁盎朝錯傳否曰曾讀既曾讀之寧不知袁盎殺朝錯乎公即袁盎吾即朝錯也錯腰斬東市其冤為何如哉纍世求報於公而公十世為高僧戒律精嚴報不得其便今汝受人主寵遇過奢名利心起於德有損故能害之今蒙迦諾迦尊者洗我以三昧法水自此以往不復與汝為冤矣悟達聞之凜然魂不住體連忙掬水洗之其痛徹髓絶而復蘇覺來其瘡不見乃知聖賢混跡非凡情所測再欲瞻敬回顧寺宇不可復見因卓菴其所遂成招提逮我宋朝至道年中賜名至德禪寺有高僧信師古作記紀其事甚詳悟達當時感其殊異深思積世之冤非遇聖人何由得釋因述為懺法朝夕禮誦後傳播天下今之懺文三卷者乃斯文也蓋取三昧水洗冤業為義命名曰水懺此悟達感迦諾迦之異應正名立義報本而為之云耳今輒敘夫故實標顯先猷庶幾開卷若禮若誦者知前賢事跡之有端由歷劫果因之不昧也啓運慈悲道場懺法一心歸命三世諸佛南無過去毗婆尸佛南無尸棄佛南無毗舍浮佛南無拘留孫佛南無拘那含牟尼佛南無迦葉佛南無本師釋迦牟尼佛南無當來彌勒尊佛
